  outcome: "Yes"
  stopAt: "2026-12-31T23:59:59Z"
signal:
  type: http.poll
  url: https://example.com/api/events
  method: GET
  pollMs: 60000
  eventsPath: $.items[*]
  dataPath: $
  eventIdPath: $.id
