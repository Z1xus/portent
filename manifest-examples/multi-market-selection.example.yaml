id: multi-market-selection
enabled: false
markets:
  - id: early-window
    url: https://polymarket.com/event/example-window-market/example-market-in-early-window
    outcome: "Yes"
    startAt: "2026-06-01T00:00:00Z"
    stopAt: "2026-06-07T23:59:59Z"
  - id: later-window
    url: https://polymarket.com/event/example-window-market/example-market-in-later-window
    outcome: "Yes"
    startAt: "2026-06-08T00:00:00Z"
    stopAt: "2026-06-14T23:59:59Z"
marketSelection:
  mode: lowestBestAsk
signal:
  type: http.poll
  url: https://example.com/api/events
  method: GET
  pollMs: 60000
  eventsPath: $.items[*]
  dataPath: $
  eventIdPath: $.id
  textPath: $.message
condition:
  type: textIncludes
  terms:
    - example trigger
  mode: any
  caseSensitive: false
order:
  side: BUY
  amountUsd: 10
  maxPrice: 0.8
  type: FOK
  once: true
notifications:
  telegram: true
